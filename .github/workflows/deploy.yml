name: Deploy to GitHub Pages

# Build and publish a static export of the Next.js site to GitHub Pages,
# served from the custom domain https://www.eagleailabs.com/ (configured
# in repo Settings → Pages, with `public/CNAME` carrying the value into
# every deploy). Triggered automatically on pushes to `amplify-deploy`,
# and on demand via the Actions tab.

on:
  push:
    branches: [amplify-deploy]
  workflow_dispatch:

# Standard Pages OIDC permissions — required by actions/deploy-pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Avoid concurrent deploys stomping each other; in-flight runs finish first.
concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Custom domain (www.eagleailabs.com) serves the site from root, so
      # NEXT_PUBLIC_BASE_PATH is intentionally unset here — Next.js builds
      # without a basePath, and scripts/postbuild-base-path.mjs becomes a
      # no-op. Keep this empty unless you switch back to serving from
      # https://jambo7.github.io/eagle-site/.
      # The capture-iphone-video script uses puppeteer, but CI never
      # runs it. Skip the ~150 MB Chromium download to keep installs fast.
      PUPPETEER_SKIP_DOWNLOAD: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
